<!DOCTYPE html>
<html>
	<head>
		<meta http-equiv='X-UA-Compatible' content='IE=edge'>
		<meta http-equiv='Content-Type' content='text/html;charset=UTF-8'>
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
		<meta name="HandheldFriendly" content="True">
		<meta name="MobileOptimized" content="240"/>
		<meta name="PalmComputingPlatform" content="true"/>
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="mobile-web-app-capable" content="yes">
		
		<link rel="shortcut icon" sizes="196x196" href="assets/images/alexa_icon_196.png">
		<link rel="apple-touch-icon" sizes="128x128" href="assets/images/alexa_icon_128.png">
		<link rel="apple-touch-icon-precomposed" sizes="128x128" href="assets/images/alexa_icon_128.png">

		<meta id="exf-page-id" name="page_id" content="[#~page:alias#]">
		
		<title>[#~page:name#]</title>
		
		<style>
			#exf-loader-spinner {
			    border: 16px solid #f3f3f3; /* Light grey */
			    border-top: 16px solid #3498db; /* Blue */
			    border-radius: 50%;
			    width: 120px;
			    height: 120px;
			    animation: spin 2s linear infinite;
				    margin: calc(100vh / 2 - 60px) auto
			}
			
			@keyframes spin {
			    0% { transform: rotate(0deg); }
			    100% { transform: rotate(360deg); }
			}

			#exf_menu_toggle_btn{
				padding-left: 1rem !important;
			}

			/* make menu stretch fullscreen on mobile */
			@media (max-width: 600px) {
				.sapTntSideNavigation{
					width: 100vw !important;
				}

				.sapTntSideNavigationNotExpanded {
					display: none !important;
				}
			}

			/* set position here, to place it above the sidemenu while the icons are not loaded yet */
			#exf-loader {width: 100%; height: 100vh; background: white; position: absolute; top: 0;}
			
			header.sapUiUfdShellHead > div, 
			hr.sapUiUfdShellBrand {background-color: [#~facade:theme_header_color#] !important;}

			header.sapUiUfdShellHead .sapMBreadcrumbsLink, 
			header.sapUiUfdShellHead .sapMBreadcrumbsLink > .sapMSltIcon::before,
			header.sapUiUfdShellHead .sapMBreadcrumbsLink > .sapMSltIcon::after,
			header.sapUiUfdShellHead .sapMBreadcrumbsSeparator {color: [#~facade:theme_header_text_color#] !important;}

			header.sapUiUfdShellHead .sapMBtn:not(:hover) > .sapMBtnInner,
			header.sapUiUfdShellHead .sapMBtn:not(:hover) > .sapMBtnInner > .sapMBtnContent,
			header.sapUiUfdShellHead .sapMBtn:not(:hover) > .sapMBtnInner > .sapMBtnIcon {color: [#~facade:theme_header_text_color#];}
		</style>
		
		<script>	
		
			// See if arrow functions (ES6) are supported
			var supportsES6 = function() {
		      try {
		        new Function("(a = 0) => a");
		      } catch (err) {
		    	  alert("Error 7EBO5IU: Incompatible browser detected!\n\nYou are using an outdated internet browser. This page will not work properly! Please open the link in Chrome, Firefox, Safari, Edge or similar.");
		      }
		    }();
		    
			// Check that service workers are registered
			if ('serviceWorker' in navigator) {				
			  // Use the window load event to keep the page load performant
			  window.addEventListener('load', function(){
				navigator.serviceWorker.register('ServiceWorker.js');
			  });
			}
		</script>
		
		<!-- Load SAPUI5, select theme and control library -->
		<script src="vendor/exface/ui5facade/Facades/js_openui5/resources/sap-ui-core.js"
				id="sap-ui-bootstrap"
				data-sap-ui-libs="sap.m,sap.tnt,sap.ui.unified,sap.ui.commons,sap.ui.table,sap.f,sap.uxap"
				data-sap-ui-theme="[#~facade:theme#]"
				data-sap-ui-bindingSyntax="complex"
				data-sap-ui-compatVersion="edge"
				data-sap-ui-preload="async"
				data-sap-ui-resourceroots='{
					"[#~page:alias#]": "api/ui5/webapps/[#~page:alias#]/"
				}'
				data-sap-ui-language="[#~session:language#]">
		</script>
		
		<script type="text/javascript" src="vendor/npm-asset/dexie/dist/dexie.min.js?[#~facade:file_version_hash#]"></script>
		<script type="text/javascript" src="vendor/exface/core/Facades/AbstractPWAFacade/exfPWA.js?[#~facade:file_version_hash#]"></script>
		<script type="module" src="vendor/exface/ui5facade/Facades/js/openui5.facade.js?[#~facade:file_version_hash#]"></script>
		<script type="text/javascript" src="vendor/exface/ui5facade/Facades/js/sparkline/sparkline.min.js?[#~facade:file_version_hash#]"></script>
		[#~facade:external_scripts#]
		<script type="text/javascript">
			// Main menu
			sap.ui.getCore().attachInit(function () {
				// Register and load the font-awesome UI5 plugin before the shell renders,
				// so that sap-icon://font-awesome/ icons work in the NavMenu.
				jQuery.sap.registerModulePath('libs.font_awesome.plugin', 'vendor/bower-asset/font-awesome-openui5/dist/font-awesome-openui5.min');
				jQuery.sap.registerModulePath('libs.exface.ui5Custom', 'vendor/exface/ui5facade/Facades/js/ui5Custom');
				sap.ui.require([
					"libs/font_awesome/plugin",
					"sap/ui/unified/Shell",
					"sap/ui/core/ComponentContainer",
					"sap/tnt/NavigationList",
					"sap/m/HBox",
					"libs/exface/ui5Custom/MultiLevelNavItem"
				], function (FontAwesomePlugin, Shell, ComponentContainer, NavigationList, HBox, MultiLevelNavItem) {
						var oShell = exfLauncher.initShell();

						var oNavMenu = [#~widget:NavMenu#]

						var oComponentContainer = new sap.ui.core.ComponentContainer({
							name: "[#~page:alias#]",
							async: true,
							manifest: true,
							settings: {
								id: "[#~page:alias#].Component"
							},
							componentCreated: function(oEvent) {
								var oComponent = oEvent.getParameters().component;
								exfLauncher.contextBar.init(oComponent);
								
								// update nav menu position when using the ui5 router -- for example when navigating through tiles
								// current page alias can be retrieved using exfLauncher.getPageAlias() 
								var oRouter = oComponent.getRouter ? oComponent.getRouter() : null;
								if (oRouter) {
									oRouter.attachRouteMatched(function(oRouteEvent) {
										exfLauncher.setPageAlias(oRouteEvent.getParameter('name'));
										var sPageAlias = exfLauncher.getPageAlias();
										if (sPageAlias && oNavMenu && oNavMenu.getItem) {
											oNavMenu.getItem().setSelectedKey(sPageAlias);
										}
									});
								}							
							},
							width: "100%",
							height: "100%",
							layoutData: new sap.m.FlexItemData({ growFactor: 1, shrinkFactor: 1, baseSize: "0%" })
						});

						// workaround for new layout with sidenavigation (without pane in shell or toolpage layout)
						oShell.addContent(
							new sap.m.HBox({
								items: [oNavMenu, oComponentContainer],
								fitContainer: true,
								height: "100%"
							})
						);

						oShell.getModel().setProperty('/_app', {
							home_title: [#~page:name:enquote#],
							home_url: './',
							app_url: '[#~page:url#]'
						});
						
						oShell.placeAt("[#~page:alias#]");
						
						setTimeout(function(){
							$('#exf-loader').hide();
						}, 1000);

						// Only show the nav menu once the FontAwesome icon font is actually rendered, 
						// otherwise the icons show as empty boxes and look ugly.
						// We cannot rely on the callback from document.fonts here, because the @font-face for "FontAwesome" is injected 
						// by the icon CSS of UI5 asynchronously, so at the time the page boots there may be no matching font face yet 
						// and the promise would resolve immediately. (The plugin registers the icons under font-family FontAwesome 
						// via IconPool.addIcon, but the actual @font-face for FontAwesome is injected by the icon CSS later.)
						// Instead we measure the rendered width of a FontAwesome glyph against the fallback font: as long as the glyph falls back, its width matches the fallback; 
						// once the icon font is loaded the width changes, and we set the menu visible
						var fnShowNavMenu = function(){
							oNavMenu.setVisible(true);
						};

						var fnWhenFontAwesomeReady = function(fnReady){
							var sGlyph = '\uf015'; // fa-home, glyph from FontAwesome
							var fnMeasure = function(sFamily){
								var oSpan = document.createElement('span');
								oSpan.style.position = 'absolute';
								oSpan.style.left = '-9999px';
								oSpan.style.top = '-9999px';
								oSpan.style.fontSize = '100px';
								oSpan.style.lineHeight = 'normal';
								oSpan.style.whiteSpace = 'nowrap';
								oSpan.style.fontFamily = sFamily;
								oSpan.textContent = sGlyph;
								document.body.appendChild(oSpan);
								var iWidth = oSpan.offsetWidth;
								document.body.removeChild(oSpan);
								return iWidth;
							};
							var iStart = Date.now();
							var iTimeout = 15000; // give up after 15s and show the menu anyway

							// check if font is loaded/compare glyphs
							var fnCheck = function(){
								var iFallback = fnMeasure('monospace');
								var iFa = fnMeasure('FontAwesome, monospace');
								// When the FontAwesome font is loaded, the glyph is rendered
								// from it and its width differs from the pure fallback.
								if (iFa !== iFallback) {
									fnReady();
									return;
								}
								if (Date.now() - iStart > iTimeout) {
									fnReady();
									return;
								}
								setTimeout(fnCheck, 100);
							};
							fnCheck();
						};

						// check fontawesome and set menu visible if loaded
						fnWhenFontAwesomeReady(fnShowNavMenu);
					});
			});
		</script>
		
	</head>
	<body class="[#ui5:density_body_class#]">
		<div id="exf-announcements"></div>
		<div id="[#~page:alias#]" class="exf-launcher"></div>
		<div id="exf-loader">
			<div id="exf-loader-spinner"></div>
		</div>
	</body>
</html>
